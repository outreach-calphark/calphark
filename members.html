<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CALPHARK | Team</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

<script>
    tailwind.config = { 
        theme: { 
            extend: { 
                fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }, 
                colors: { primary: '#000819' } 
            } 
        } 
    }
</script>

<style>
/* === CUSTOM SCROLLBAR HIDING === */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* === PAGE OFFSET & THEME === */
body { background-color: #000819; color: #fff; }

.page-top { margin-top: 130px; }
@media (max-width: 768px) { .page-top { margin-top: 100px; } }

/* === GLASS EFFECT (Updated to members2 Style) === */
.glass-card { 
    background: rgba(255, 255, 255, 0.05); 
    backdrop-filter: blur(12px); 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    transition: all 0.3s ease;
}

/* === STICKY SUB NAV === */
.sticky-subnav {
  position: sticky;
  top: 100px;
  z-index: 100;
}

/* === SUB NAV BUTTONS === */
.subnav button {
  font-weight: 700;
  color: #a78bfa; /* purple-400 */
  padding-bottom: 12px;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 0.75rem;
  transition: all 0.3s;
}
.subnav button.active {
  color: white;
  border-bottom: 2px solid white;
}

/* === MEMBER CARD (members2 Style) === */
.member-container {
    perspective: 1000px;
}

.member {
  position: relative;
  height: 380px; /* Matching members2 card height */
  border-radius: 24px;
  overflow: hidden;
  transition: transform 0.5s ease;
}

.member:hover {
  transform: translateY(-10px) scale(1.02);
}

.member-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, #5048e5 0%, transparent 70%);
    opacity: 0.85;
}

/* === SOCIAL ICONS === */
.social {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  gap: 12px;
  z-index: 10;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
}

.member:hover .social {
  opacity: 1;
  transform: translateY(0);
}

/* === AVATAR (members2 Background Image Style) === */
.avatar-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.7;
  transition: transform 0.5s ease;
}
.member:hover .avatar-bg {
    transform: scale(1.1);
}
</style>
</head>

<body class="antialiased">

<div id="header-container"></div>
<script>
fetch("header.html")
  .then(r=>r.text())
  .then(d=>document.getElementById("header-container").innerHTML=d);
</script>

<main class="pt-48 pb-20 px-6 max-w-7xl mx-auto">
    <h1 class="text-6xl font-bold mb-6">Our <span class="text-purple-300">Leaders.</span></h1>
    <p class="text-xl text-purple-100 max-w-3xl mb-12">Meet the visionaries, developers, and designers driving the AI revolution at Calphark.</p>

    <section class="sticky-subnav">
      <div class="flex gap-8 border-b border-white/20 pb-0 subnav overflow-x-auto no-scrollbar items-center">
        <button class="active shrink-0" onclick="renderTeam('all',event)">All</button>
        <button class="shrink-0" onclick="renderTeam('core',event)">Core Team</button>
        <button class="shrink-0" onclick="renderTeam('dev',event)">Developers</button>
        <button class="shrink-0" onclick="renderTeam('design',event)">Designers</button>
      </div>
    </section>

    <section id="team" class="mt-16 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 pb-24">
    </section>
</main>

<script>
/* TEAM DATA */
const team=[
 {type:"core",name:"Jeswin Simon",role:"CEO & Founder",
  img:"profile.png",insta:"https://www.instagram.com/calphark_official?igsh=MXV3a205dTBzem83eQ==",linkedin:"https://www.linkedin.com/in/jeswin-simon-860486384/"},
  {type:"dev",name:"Erwin Nicholas M",role:"Backend Developer",
  img:"profile.png",insta:"#",linkedin:"#"},
 {type:"dev",name:"Jagadheeswaran R",role:"Frontend Developer",
  img:"profile.png",insta:"#",linkedin:"#"},
 {type:"design",name:"Keerthivasan",role:"UI/UX Designer",
  img:"profile.png",insta:"#",linkedin:"#"},
 {type:"dev",name:"Kanagavalli A",role:"AI Engineer",
  img:"profile.png",insta:"#",linkedin:"#"},
 {type:"design",name:"Karthik S",role:"Graphic Designer",
  img:"profile.png",insta:"#",linkedin:"#"}
];

/* RENDER TEAM METHOD (Retained logic, updated HTML structure) */
function renderTeam(type,event){
  if(event){
    document.querySelectorAll(".subnav button")
      .forEach(b=>b.classList.remove("active", "border-b-2", "border-white", "text-white"));
    event.target.classList.add("active");
  }

  const box=document.getElementById("team");
  box.innerHTML="";

  const filtered = team.filter(m=>type==="all"||m.type===type);
  
  if(filtered.length === 0){
      box.innerHTML = `<div class="col-span-full text-center text-gray-400 py-10">No members found in this category.</div>`;
      return;
  }

  filtered.forEach(m=>{
    // Updated structure to use members2 style cards while staying dynamic
    box.innerHTML+=`
    <div class="member glass-card group">
        <img src="${m.img}" class="avatar-bg" alt="${m.name}">
        
        <div class="member-gradient"></div>

        <div class="social">
            <a href="${m.insta}" target="_blank" class="hover:text-purple-300">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a href="${m.linkedin}" target="_blank" class="hover:text-purple-300">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
        </div>

        <div class="absolute bottom-0 p-8 w-full z-10">
            <h3 class="text-2xl font-bold">${m.name}</h3>
            <p class="text-purple-200 font-medium">${m.role}</p>
        </div>
    </div>
    `;
  });
}

/* DEFAULT */
renderTeam("all");
</script>

</body>
</html>
